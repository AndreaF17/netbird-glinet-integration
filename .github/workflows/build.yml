name: build

# Manual, no tags required: trigger from the Actions tab → "build" → Run
# workflow. It builds the integration .ipk and (by default) publishes a GitHub
# Release for it. Pushing a v* tag also works as a convenience.
on:
  workflow_dispatch:
    inputs:
      integration_version:
        description: "Panel version to build/release (e.g. 1.0)"
        required: true
        default: "1.0"
      publish:
        description: "Publish a GitHub Release (untick for a test build only)"
        type: boolean
        default: true
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: build-${{ github.event.inputs.integration_version || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.r.outputs.version }}
      release_tag: ${{ steps.r.outputs.release_tag }}
    steps:
      - name: Resolve version + release tag
        id: r
        env:
          EVENT: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.integration_version }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          if [ "$EVENT" = "workflow_dispatch" ]; then
            VER="${INPUT_VERSION#v}"
            if [ "$INPUT_PUBLISH" = "true" ]; then TAG="v$VER"; else TAG=""; fi
          else
            VER="${REF_NAME#v}"
            TAG="$REF_NAME"
          fi
          echo "$VER" | grep -Eq '^[0-9A-Za-z][0-9A-Za-z.+-]*$' \
            || { echo "error: invalid version '$VER'" >&2; exit 1; }
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building integration $VER (release tag: '${TAG:-none}')"

  build:
    needs: resolve
    permissions:
      contents: write
    uses: ./.github/workflows/_build.yml
    with:
      integration_version: ${{ needs.resolve.outputs.version }}
      release_tag: ${{ needs.resolve.outputs.release_tag }}
