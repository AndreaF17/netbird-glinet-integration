name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      netbird_version:
        description: "NetBird version to build (e.g. 0.72.3). Empty = latest release."
        required: false
        default: ""
  schedule:
    # Daily check for new netbird releases.
    - cron: "23 5 * * *"

permissions:
  contents: write

jobs:
  # Two version axes, deliberately decoupled:
  #   - this repo's own tags (v0.1, v0.2, ...) version the integration;
  #     pushing one builds the LATEST upstream netbird into that release.
  #   - automated upstream tracking publishes under netbird-v<X.Y.Z> tags
  #     (scheduled daily check, and manual dispatch with a version input).
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      proceed: ${{ steps.resolve.outputs.proceed }}
    steps:
      - name: Resolve netbird version and release tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.netbird_version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          VER=""
          if [ "$EVENT" = "workflow_dispatch" ]; then
            VER="${INPUT_VERSION#v}"
          fi
          if [ -z "$VER" ]; then
            VER="$(curl -fsSL https://api.github.com/repos/netbirdio/netbird/releases/latest \
              | jq -r '.tag_name | ltrimstr("v")')"
          fi
          [ -n "$VER" ] && [ "$VER" != "null" ]
          echo "version=$VER" >> "$GITHUB_OUTPUT"

          if [ "$EVENT" = "push" ]; then
            # Integration release: the pushed repo tag names the release.
            RELEASE_TAG="$REF_NAME"
          else
            RELEASE_TAG="netbird-v$VER"
          fi
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

          # On the scheduled run, skip if this upstream version was already
          # published by a previous scheduled/dispatch build.
          PROCEED=true
          if [ "$EVENT" = "schedule" ] && gh release view "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists, nothing to do."
            PROCEED=false
          fi
          echo "proceed=$PROCEED" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    if: needs.resolve.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .ipk
        env:
          NETBIRD_VERSION: ${{ needs.resolve.outputs.version }}
        run: ./build.sh

      - name: Checksums
        run: |
          cd out
          sha256sum netbird_*.ipk > sha256sums.txt
          cat sha256sums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netbird-ipk-${{ needs.resolve.outputs.version }}
          path: |
            out/netbird_*.ipk
            out/sha256sums.txt

      - name: Publish release
        # Integration tag pushes release under the pushed tag; scheduled and
        # dispatched upstream builds release under netbird-v<X.Y.Z>.
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ needs.resolve.outputs.version }}
          TAG: ${{ needs.resolve.outputs.release_tag }}
        run: |
          set -eu
          if ! gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" -R "$GITHUB_REPOSITORY" \
              --title "netbird $VER for GL.iNet GL-X2000 ($TAG)" \
              --notes "Static NetBird client $VER packaged as .ipk for aarch64_cortex-a53_neon-vfpv4 (GL-X2000). Built from https://github.com/netbirdio/netbird/releases/tag/v$VER"
          fi
          gh release upload "$TAG" -R "$GITHUB_REPOSITORY" --clobber \
            out/netbird_*.ipk out/sha256sums.txt
