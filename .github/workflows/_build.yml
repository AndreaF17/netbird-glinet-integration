# Reusable build: package the GL-X2000 NetBird integration .ipk and optionally
# publish a GitHub Release with the artifacts attached. The package contains the
# panel + wrapper + self-updater only (no netbird binary — the router downloads
# netbird at install time), so it is versioned by the integration version.
#
# Pass release_tag="" to produce artifacts only (no Release is published).
name: _build

on:
  workflow_call:
    inputs:
      integration_version:
        description: "Panel/integration version, e.g. 1.0"
        required: true
        type: string
      release_tag:
        description: "Tag to publish the Release under. Empty = artifact only."
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .ipk
        env:
          INTEGRATION_VERSION: ${{ inputs.integration_version }}
        run: ./build.sh

      - name: Checksums
        run: |
          cd out
          sha256sum netbird_*.ipk > sha256sums.txt
          cat sha256sums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netbird-glx2000-${{ inputs.integration_version }}
          path: |
            out/netbird_*.ipk
            out/sha256sums.txt

      - name: Publish release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ inputs.integration_version }}
          TAG: ${{ inputs.release_tag }}
        run: |
          set -eu
          if ! gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" -R "$GITHUB_REPOSITORY" \
              --title "NetBird GL-X2000 panel $VER" \
              --notes "GL.iNet GL-X2000 NetBird integration $VER (.ipk, aarch64_cortex-a53_neon-vfpv4). Panel + wrapper + self-updater; the netbird client is downloaded from the official netbird releases at install and updated from the panel."
          fi
          gh release upload "$TAG" -R "$GITHUB_REPOSITORY" --clobber \
            out/netbird_*.ipk out/sha256sums.txt
