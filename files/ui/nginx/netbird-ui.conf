# netbird: inject the NetBird admin-panel page into the GL.iNet SPA.
# Dropped into /etc/nginx/gl-conf.d/ (included at server level by GL nginx).
header_filter_by_lua_file /usr/share/netbird-ui/netbird-header-filter.lua;
body_filter_by_lua_file /usr/share/netbird-ui/netbird-body-filter.lua;

# Serve our static frontend. no-cache makes browsers revalidate netbird.js
# on each panel load, so package updates don't serve a stale cached UI.
location /netbird-ui/ {
    alias /usr/share/netbird-ui/www/;
    add_header Cache-Control "no-cache";
}
